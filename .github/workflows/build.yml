name: Build ESP32 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup ESP-IDF
      uses: espressif/esp-idf-ci-action@v1

    - name: Build firmware
      run: |
        idf.py build

    - name: Upload .bin files
      uses: actions/upload-artifact@v3
      with:
        name: esp32-firmware
        path: build/*.bin
