name: Build ESP32 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install PlatformIO
      run: pip install -U platformio

    # ✅ Clean everything (important)
    - name: Clean PlatformIO
      run: |
        rm -rf ~/.platformio
        rm -rf .pio

    # ✅ FIX: Disable git metadata copying
    - name: Fix git folder issue
      run: |
        export PLATFORMIO_DISABLE_PROGRESSBAR=true
        export PLATFORMIO_SETTING_ENABLE_SYMLINKS=false

    # ✅ Build
    - name: Build firmware (ESP32 DevKit V1)
      run: pio run -e ESP32-devKitv1

    # Debug (optional)
    - name: Show build output
      run: ls -R .pio/build

    # ✅ Upload
    - name: Upload .bin files
      uses: actions/upload-artifact@v4
      with:
        name: esp32-bin
        path: .pio/build/**/**/*.bin
