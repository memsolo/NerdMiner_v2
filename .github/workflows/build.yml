name: Build ESP32 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install PlatformIO
      run: pip install platformio

    # ✅ FIX: Clean broken cache
    - name: Clean PlatformIO cache
      run: |
        rm -rf ~/.platformio/.cache
        rm -rf ~/.platformio/packages
        rm -rf ~/.platformio/platforms

    # ✅ Build only your board
    - name: Build firmware (ESP32 DevKit V1)
      run: pio run -e ESP32-devKitv1

    # Debug (optional but helpful)
    - name: Show build files
      run: ls -R .pio/build

    # ✅ Upload firmware
    - name: Upload .bin files
      uses: actions/upload-artifact@v4
      with:
        name: esp32-bin
        path: .pio/build/**/**/*.bin
